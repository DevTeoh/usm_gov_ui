<div class="profile-page">
  <h1 class="h4 mb-3">My account</h1>
  <mat-card class="mb-3">
    <mat-card-header>
      <mat-card-title>Profile</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" class="profile-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
        </mat-form-field>
      </form>
    </mat-card-content>
  </mat-card>
  <mat-card>
    <mat-card-header>
      <mat-card-title>Settings</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" class="settings-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Theme</mat-label>
          <mat-select formControlName="theme" (selectionChange)="onThemeChange($event.value)">
            @for (o of themeOptions; track o.value) {
              <mat-option [value]="o.value">{{ o.label }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Language</mat-label>
          <mat-select formControlName="language" (selectionChange)="onLanguageChange($event.value)">
            @for (o of languageOptions; track o.value) {
              <mat-option [value]="o.value">{{ o.label }}</mat-option>
            }
          </mat-select>
        </mat-form-field>

        @if (error(); as err) {
          <p class="error-text">{{ err }}</p>
        }
        @if (saved()) {
          <p class="success-text">Saved.</p>
        }

        <button mat-flat-button color="primary" type="button" (click)="savePreferences()" [disabled]="saving()">
          @if (saving()) { <mat-spinner diameter="20"></mat-spinner> } @else { Save settings }
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
