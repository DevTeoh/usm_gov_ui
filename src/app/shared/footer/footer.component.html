<footer class="app-footer">
  <div class="container py-3">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
      <span class="text-muted small">&copy; {{ currentYear }} {{ appName }}</span>
      <div class="d-flex gap-3">
        @for (link of links; track link.href) {
          @if (link.external) {
            <a [href]="link.href" target="_blank" rel="noopener noreferrer" class="text-muted small footer-link">
              {{ link.label }}
            </a>
          } @else {
            <a [routerLink]="link.href" class="text-muted small footer-link">{{ link.label }}</a>
          }
        }
      </div>
    </div>
  </div>
</footer>
